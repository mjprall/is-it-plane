<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background - ocean at night/day -->
  <defs>
    <linearGradient id="skyBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#B0D8F0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waterBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E90FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006994;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#skyBg)"/>
  <rect x="0" y="170" width="400" height="130" fill="url(#waterBg)"/>
  <!-- Waves -->
  <path d="M0,178 Q40,170 80,178 Q120,186 160,178 Q200,170 240,178 Q280,186 320,178 Q360,170 400,178 L400,190 Q360,182 320,190 Q280,198 240,190 Q200,182 160,190 Q120,198 80,190 Q40,182 0,190Z" fill="#1A80E8" opacity="0.5"/>
  <!-- Clouds -->
  <ellipse cx="80" cy="50" rx="55" ry="27" fill="white" opacity="0.9"/>
  <ellipse cx="112" cy="42" rx="42" ry="21" fill="white" opacity="0.9"/>
  <ellipse cx="320" cy="70" rx="60" ry="28" fill="white" opacity="0.8"/>
  <!-- Helicopter body -->
  <ellipse cx="200" cy="155" rx="75" ry="28" fill="#4A8FA8"/>
  <!-- Cockpit bubble -->
  <ellipse cx="255" cy="150" rx="32" ry="24" fill="#3A7F98"/>
  <ellipse cx="260" cy="147" rx="26" ry="18" fill="#88CCEE" opacity="0.7"/>
  <!-- Tail boom -->
  <path d="M125,162 Q100,158 75,148 Q70,145 68,142" stroke="#3A7F98" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Tail rotor -->
  <circle cx="65" cy="142" r="5" fill="#2A6F88"/>
  <line x1="65" y1="120" x2="65" y2="142" stroke="#1A5A70" stroke-width="4" stroke-linecap="round"/>
  <line x1="65" y1="142" x2="65" y2="164" stroke="#1A5A70" stroke-width="4" stroke-linecap="round"/>
  <line x1="44" y1="142" x2="86" y2="142" stroke="#1A5A70" stroke-width="3" stroke-linecap="round"/>
  <!-- Vertical tail fin -->
  <polygon points="68,142 60,115 80,138" fill="#3A7F98"/>
  <!-- Main rotor hub -->
  <circle cx="200" cy="125" r="8" fill="#2A6F88"/>
  <!-- Main rotor blades -->
  <ellipse cx="200" cy="125" rx="100" ry="7" fill="#1A5A70" opacity="0.85" transform="rotate(-15 200 125)"/>
  <ellipse cx="200" cy="125" rx="100" ry="7" fill="#1A5A70" opacity="0.85" transform="rotate(75 200 125)"/>
  <ellipse cx="200" cy="125" rx="100" ry="7" fill="#1A5A70" opacity="0.85" transform="rotate(-105 200 125)"/>
  <!-- Landing skids -->
  <line x1="155" y1="178" x2="145" y2="198" stroke="#2A6F88" stroke-width="4"/>
  <line x1="245" y1="178" x2="255" y2="198" stroke="#2A6F88" stroke-width="4"/>
  <line x1="130" y1="198" x2="175" y2="198" stroke="#2A6F88" stroke-width="4"/>
  <line x1="225" y1="198" x2="270" y2="198" stroke="#2A6F88" stroke-width="4"/>
  <!-- Windows on side -->
  <rect x="180" y="145" width="18" height="14" rx="4" fill="#88CCEE" opacity="0.8"/>
  <rect x="157" y="148" width="16" height="12" rx="4" fill="#88CCEE" opacity="0.8"/>
  <!-- Label -->
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Helicopter</text>
</svg>
