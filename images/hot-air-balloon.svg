<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Sky background -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6699CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#99CCFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#skyGrad)"/>
  <!-- Horizon -->
  <rect x="0" y="240" width="400" height="60" fill="#558833"/>
  <!-- Clouds -->
  <ellipse cx="60" cy="70" rx="48" ry="23" fill="white" opacity="0.85"/>
  <ellipse cx="90" cy="60" rx="36" ry="18" fill="white" opacity="0.85"/>
  <ellipse cx="330" cy="90" rx="52" ry="25" fill="white" opacity="0.75"/>
  <!-- Balloon envelope (colorful stripes) -->
  <ellipse cx="200" cy="130" rx="85" ry="100" fill="#EE4444"/>
  <!-- Stripe overlays -->
  <path d="M200,30 Q245,30 270,60 Q245,90 200,100 Q155,90 130,60 Q155,30 200,30Z" fill="#FFCC00"/>
  <path d="M200,100 Q245,90 275,120 Q245,150 200,155 Q155,150 125,120 Q155,90 200,100Z" fill="#EE4444"/>
  <path d="M200,155 Q245,150 272,180 Q245,210 200,215 Q155,210 128,180 Q155,150 200,155Z" fill="#FFCC00"/>
  <path d="M200,215 Q240,210 260,225 Q240,238 200,240 Q160,238 140,225 Q160,210 200,215Z" fill="#EE4444"/>
  <!-- Balloon highlight -->
  <ellipse cx="165" cy="90" rx="20" ry="35" fill="white" opacity="0.15"/>
  <!-- Ropes from balloon -->
  <line x1="160" y1="228" x2="165" y2="260" stroke="#8B5E1A" stroke-width="2"/>
  <line x1="200" y1="238" x2="200" y2="260" stroke="#8B5E1A" stroke-width="2"/>
  <line x1="240" y1="228" x2="235" y2="260" stroke="#8B5E1A" stroke-width="2"/>
  <!-- Basket -->
  <rect x="162" y="258" width="76" height="35" rx="5" fill="#C4922A"/>
  <!-- Basket weave pattern -->
  <line x1="175" y1="258" x2="175" y2="293" stroke="#A07020" stroke-width="1.5"/>
  <line x1="190" y1="258" x2="190" y2="293" stroke="#A07020" stroke-width="1.5"/>
  <line x1="205" y1="258" x2="205" y2="293" stroke="#A07020" stroke-width="1.5"/>
  <line x1="220" y1="258" x2="220" y2="293" stroke="#A07020" stroke-width="1.5"/>
  <line x1="235" y1="258" x2="235" y2="293" stroke="#A07020" stroke-width="1.5"/>
  <line x1="162" y1="267" x2="238" y2="267" stroke="#A07020" stroke-width="1.5"/>
  <line x1="162" y1="276" x2="238" y2="276" stroke="#A07020" stroke-width="1.5"/>
  <line x1="162" y1="285" x2="238" y2="285" stroke="#A07020" stroke-width="1.5"/>
  <!-- Person in basket (simplified) -->
  <circle cx="193" cy="263" r="6" fill="#FFDDBB"/>
  <rect x="189" y="269" width="8" height="12" rx="2" fill="#3366AA"/>
  <!-- Flame -->
  <path d="M192,252 Q196,240 200,235 Q204,240 208,252Z" fill="#FF6600" opacity="0.8"/>
  <path d="M195,252 Q200,244 205,252Z" fill="#FFCC00" opacity="0.9"/>
</svg>
