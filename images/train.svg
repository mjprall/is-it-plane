<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#87CEEB"/>
  <!-- Ground -->
  <rect x="0" y="230" width="400" height="70" fill="#7A9B5A"/>
  <!-- Train tracks -->
  <rect x="0" y="235" width="400" height="8" fill="#8B7355"/>
  <rect x="0" y="253" width="400" height="8" fill="#8B7355"/>
  <!-- Track ties -->
  <rect x="10" y="233" width="12" height="30" fill="#6B5035"/>
  <rect x="40" y="233" width="12" height="30" fill="#6B5035"/>
  <rect x="70" y="233" width="12" height="30" fill="#6B5035"/>
  <rect x="100" y="233" width="12" height="30" fill="#6B5035"/>
  <rect x="130" y="233" width="12" height="30" fill="#6B5035"/>
  <rect x="160" y="233" width="12" height="30" fill="#6B5035"/>
  <rect x="190" y="233" width="12" height="30" fill="#6B5035"/>
  <rect x="220" y="233" width="12" height="30" fill="#6B5035"/>
  <rect x="250" y="233" width="12" height="30" fill="#6B5035"/>
  <rect x="280" y="233" width="12" height="30" fill="#6B5035"/>
  <rect x="310" y="233" width="12" height="30" fill="#6B5035"/>
  <rect x="340" y="233" width="12" height="30" fill="#6B5035"/>
  <rect x="370" y="233" width="12" height="30" fill="#6B5035"/>
  <!-- Engine body -->
  <rect x="240" y="175" width="140" height="65" rx="5" fill="#CC3333"/>
  <!-- Engine front -->
  <rect x="358" y="185" width="30" height="50" rx="8" fill="#BB2222"/>
  <!-- Cow catcher -->
  <polygon points="375,235 390,235 395,250 370,250" fill="#993333"/>
  <!-- Engine cab -->
  <rect x="240" y="158" width="85" height="22" rx="4" fill="#DD4444"/>
  <!-- Engine windows -->
  <rect x="252" y="163" width="18" height="12" rx="3" fill="#88BBDD" opacity="0.8"/>
  <rect x="278" y="163" width="18" height="12" rx="3" fill="#88BBDD" opacity="0.8"/>
  <!-- Smokestack -->
  <rect x="340" y="158" width="18" height="22" rx="3" fill="#555"/>
  <rect x="336" y="154" width="26" height="8" rx="4" fill="#444"/>
  <!-- Smoke puffs -->
  <circle cx="349" cy="145" r="13" fill="#CCC" opacity="0.6"/>
  <circle cx="358" cy="130" r="10" fill="#CCC" opacity="0.5"/>
  <circle cx="363" cy="118" r="8" fill="#CCC" opacity="0.4"/>
  <!-- Engine wheels -->
  <circle cx="280" cy="238" r="20" fill="#333"/>
  <circle cx="280" cy="238" r="14" fill="#555"/>
  <circle cx="280" cy="238" r="6" fill="#888"/>
  <circle cx="320" cy="238" r="20" fill="#333"/>
  <circle cx="320" cy="238" r="14" fill="#555"/>
  <circle cx="320" cy="238" r="6" fill="#888"/>
  <circle cx="355" cy="238" r="15" fill="#333"/>
  <circle cx="355" cy="238" r="10" fill="#555"/>
  <circle cx="355" cy="238" r="5" fill="#888"/>
  <!-- Passenger car -->
  <rect x="65" y="180" width="170" height="60" rx="6" fill="#4477AA"/>
  <!-- Car windows -->
  <rect x="78" y="190" width="20" height="16" rx="3" fill="#88CCEE" opacity="0.8"/>
  <rect x="106" y="190" width="20" height="16" rx="3" fill="#88CCEE" opacity="0.8"/>
  <rect x="134" y="190" width="20" height="16" rx="3" fill="#88CCEE" opacity="0.8"/>
  <rect x="162" y="190" width="20" height="16" rx="3" fill="#88CCEE" opacity="0.8"/>
  <rect x="190" y="190" width="20" height="16" rx="3" fill="#88CCEE" opacity="0.8"/>
  <!-- Car wheels -->
  <circle cx="100" cy="240" r="16" fill="#333"/>
  <circle cx="100" cy="240" r="10" fill="#555"/>
  <circle cx="100" cy="240" r="5" fill="#888"/>
  <circle cx="150" cy="240" r="16" fill="#333"/>
  <circle cx="150" cy="240" r="10" fill="#555"/>
  <circle cx="150" cy="240" r="5" fill="#888"/>
  <circle cx="205" cy="240" r="16" fill="#333"/>
  <circle cx="205" cy="240" r="10" fill="#555"/>
  <circle cx="205" cy="240" r="5" fill="#888"/>
  <!-- Coupler between cars -->
  <rect x="232" y="210" width="12" height="8" rx="2" fill="#888"/>
  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Train</text>
</svg>
