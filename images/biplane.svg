<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#87CEEB"/>
  <!-- Clouds -->
  <ellipse cx="60" cy="70" rx="45" ry="22" fill="white" opacity="0.7"/>
  <ellipse cx="85" cy="60" rx="35" ry="17" fill="white" opacity="0.7"/>
  <ellipse cx="330" cy="90" rx="50" ry="24" fill="white" opacity="0.7"/>
  <!-- Biplane upper fuselage -->
  <rect x="110" y="145" width="180" height="28" rx="10" fill="#D44"/>
  <!-- Biplane lower fuselage -->
  <rect x="120" y="185" width="160" height="22" rx="8" fill="#C33"/>
  <!-- Upper wings -->
  <rect x="80" y="135" width="240" height="15" rx="5" fill="#E55"/>
  <!-- Lower wings -->
  <rect x="90" y="178" width="220" height="12" rx="5" fill="#E55"/>
  <!-- Wing struts -->
  <line x1="130" y1="150" x2="125" y2="178" stroke="#AA2222" stroke-width="3"/>
  <line x1="160" y1="150" x2="155" y2="178" stroke="#AA2222" stroke-width="3"/>
  <line x1="240" y1="150" x2="245" y2="178" stroke="#AA2222" stroke-width="3"/>
  <line x1="270" y1="150" x2="275" y2="178" stroke="#AA2222" stroke-width="3"/>
  <!-- Nose -->
  <ellipse cx="288" cy="155" rx="15" ry="14" fill="#BB3333"/>
  <!-- Propeller -->
  <line x1="303" y1="138" x2="303" y2="172" stroke="#553311" stroke-width="6" stroke-linecap="round"/>
  <line x1="290" y1="155" x2="316" y2="155" stroke="#553311" stroke-width="4" stroke-linecap="round"/>
  <!-- Cockpit open top -->
  <ellipse cx="230" cy="145" rx="20" ry="10" fill="#88BBEE" opacity="0.8"/>
  <!-- Tail -->
  <polygon points="110,159 90,140 100,173" fill="#C33"/>
  <polygon points="110,168 88,182 100,185" fill="#C33"/>
  <!-- Vertical fin -->
  <polygon points="112,159 100,130 122,159" fill="#C33"/>
  <!-- Wheels and landing gear -->
  <line x1="155" y1="196" x2="150" y2="218" stroke="#553311" stroke-width="3"/>
  <circle cx="150" cy="222" r="8" fill="#333"/>
  <line x1="240" y1="196" x2="245" y2="218" stroke="#553311" stroke-width="3"/>
  <circle cx="245" cy="222" r="8" fill="#333"/>
  <!-- Tail wheel -->
  <line x1="120" y1="196" x2="118" y2="210" stroke="#553311" stroke-width="2"/>
  <circle cx="118" cy="213" r="5" fill="#333"/>
  <!-- Stars on wings -->
  <text x="200" y="148" text-anchor="middle" font-size="12" fill="white">✦</text>
  <text x="200" y="188" text-anchor="middle" font-size="10" fill="white">✦</text>
  <!-- Label -->
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Biplane</text>
</svg>
