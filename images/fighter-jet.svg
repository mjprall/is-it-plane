<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#4A6741"/>
  <!-- Ground/jungle background -->
  <rect x="0" y="180" width="400" height="120" fill="#3A5731"/>
  <!-- Trees -->
  <polygon points="30,180 50,130 70,180" fill="#2D4A28"/>
  <polygon points="340,180 360,120 380,180" fill="#2D4A28"/>
  <!-- Sky -->
  <circle cx="320" cy="50" r="35" fill="#FFD700" opacity="0.9"/>
  <!-- Fighter jet body -->
  <polygon points="200,100 350,155 200,165 50,155" fill="#6B7C6A"/>
  <!-- Cockpit -->
  <ellipse cx="270" cy="148" rx="30" ry="12" fill="#88AACC" opacity="0.8"/>
  <ellipse cx="270" cy="147" rx="28" ry="10" fill="#99BBDD" opacity="0.6"/>
  <!-- Delta wings -->
  <polygon points="200,160 90,210 130,160" fill="#5A6B59"/>
  <polygon points="200,160 310,210 270,160" fill="#5A6B59"/>
  <!-- Wing markings -->
  <line x1="130" y1="160" x2="200" y2="160" stroke="#4A5A49" stroke-width="2"/>
  <!-- Tail fin -->
  <polygon points="60,155 90,110 100,155" fill="#5A6B59"/>
  <!-- Missiles under wings -->
  <rect x="130" y="175" width="25" height="5" rx="2" fill="#8B7355"/>
  <rect x="255" y="175" width="25" height="5" rx="2" fill="#8B7355"/>
  <!-- Exhaust -->
  <ellipse cx="65" cy="155" rx="15" ry="8" fill="#444"/>
  <!-- Nose -->
  <polygon points="350,155 350,160 380,157" fill="#5A6B59"/>
  <!-- Label -->
  <text x="200" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">Fighter Jet</text>
</svg>
